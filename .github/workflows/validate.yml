name: Validate Extensions

on:
  pull_request:
    paths:
      - 'extensions/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate extension YAML files
        run: |
          errors=0
          for dir in extensions/*/; do
            [ -d "$dir" ] || continue
            slug=$(basename "$dir")
            file="$dir/extension.yaml"

            if [ ! -f "$file" ]; then
              echo "::error::$slug: missing extension.yaml"
              errors=$((errors + 1))
              continue
            fi

            # Check for # cai-extension header
            first_line=$(head -1 "$file")
            if [ "$first_line" != "# cai-extension" ]; then
              echo "::error::$slug: must start with '# cai-extension' on the first line"
              errors=$((errors + 1))
            fi

            # Check required fields
            for field in name description author version tags icon type; do
              if ! grep -q "^$field:" "$file"; then
                echo "::error::$slug: missing required field '$field'"
                errors=$((errors + 1))
              fi
            done

            # Check type is valid
            type=$(grep '^type:' "$file" | head -1 | sed 's/^type: *//')
            case "$type" in
              prompt|url|webhook|deeplink) ;;
              applescript|shell)
                echo "::error::$slug: type '$type' is not allowed for security reasons"
                errors=$((errors + 1))
                ;;
              *)
                echo "::error::$slug: type must be 'prompt', 'url', 'webhook', or 'deeplink', got '$type'"
                errors=$((errors + 1))
                ;;
            esac

            # Check author matches PR submitter
            author=$(grep '^author:' "$file" | head -1 | sed 's/^author: *//')
            pr_author="${{ github.event.pull_request.user.login }}"
            if [ -n "$author" ] && [ "$author" != "$pr_author" ]; then
              echo "::error::$slug: author field '$author' must match your GitHub username '$pr_author'"
              errors=$((errors + 1))
            fi

            # Check slug matches directory name convention (lowercase, hyphens)
            if ! echo "$slug" | grep -qE '^[a-z0-9][a-z0-9-]*$'; then
              echo "::error::$slug: directory name must be lowercase with hyphens only"
              errors=$((errors + 1))
            fi
          done

          if [ $errors -gt 0 ]; then
            echo "::error::Found $errors validation error(s)"
            exit 1
          fi
          echo "All extensions valid!"
